paper:
  title: "Token-Budget-Aware LLM Reasoning"
  url: "https://arxiv.org/abs/2412.18547"
  year: 2025
  venue: "ACL 2025 Findings"
  authors: "Wang et al."
  technique_summary: "Dynamically estimates token budgets based on question complexity and injects budget constraints into prompts to guide the model toward shorter reasoning. TALE-EP uses an external LLM to predict budgets; TALE-PT internalizes budget estimation through parameter tuning."
  key_algorithms:
    - "Token Budget Estimation: Estimates the minimum tokens required for reasoning based on question complexity"
    - "Budget Injection: Injects budget constraints into prompts to guide the model toward concise reasoning"
    - "Budget Search: Binary search to find the optimal budget (minimizing tokens while preserving accuracy)"
    - "Preset Budget: Presets token budgets by dataset difficulty tier (training-free deployment)"
  evaluation_datasets:
    - name: "GSM8K"
      scale: 500
      type: "math"
    - name: "MATH-500"
      scale: 500
      type: "math"
    - name: "GPQA"
      scale: 200
      type: "multiple_choice"
    - name: "AMC"
      scale: 40
      type: "math"
    - name: "AIME"
      scale: 30
      type: "math"
