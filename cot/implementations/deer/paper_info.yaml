paper:
  title: "DEER: Dynamic Early Exit in Reasoning"
  url: "https://arxiv.org/abs/2504.15895"
  year: 2025
  venue: "Preprint"
  authors: "Yang et al."
  technique_summary: "DEER monitors Wait breakpoints during reasoning, injects trial answer prompts, evaluates confidence via logprobs, and exits early when confidence is high. Supports progressive budgets [0.5x, 0.8x, 1.0x] for multi-round evaluation."
  key_algorithms:
    - "Wait Breakpoint Detection: Identifies Wait/re-evaluation breakpoints in reasoning as candidate exit points"
    - "Trial Answer Injection: Injects trial answer prompts at breakpoints to guide the model to produce intermediate answers"
    - "Confidence Evaluation: Evaluates trial answer confidence based on logprobs (heuristic fallback scheme)"
    - "Early Exit Decision: Terminates reasoning early when confidence exceeds threshold, saving tokens"
    - "Progressive Budget: Progressive multi-round budgets [0.5x, 0.8x, 1.0x], gradually relaxing exit conditions"
  evaluation_datasets:
    - name: "GSM8K"
      scale: 500
      type: "math"
    - name: "MATH-500"
      scale: 500
      type: "math"
    - name: "GPQA"
      scale: 200
      type: "multiple_choice"
    - name: "AMC"
      scale: 100
      type: "math"
    - name: "AIME"
      scale: 30
      type: "math"
