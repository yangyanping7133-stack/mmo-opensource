method: deer
paper: "arXiv:2504.15895"
description: "Dynamic Early Exit in Reasoning — confidence-based early exit via Wait segmentation"

params:
  threshold: 0.95
  max_steps: 4
  think_ratio: 0.8
  temperature: 0.6
  max_tokens: 8192

per_dataset:
  GSM8K: {threshold: 0.95, max_steps: 4}
  MATH500: {threshold: 0.98, max_steps: 8}
  GPQA: {threshold: 0.95, max_steps: 4}
  AMC: {threshold: 0.98, max_steps: 12}
  AIME: {threshold: 0.98, max_steps: 12}

progressive_budget:
  enabled: true
  levels: [0.5, 0.8, 1.0]
  baseline_think_tokens:
    GSM8K: 1144
    MATH500: 2800
    GPQA: 651
    AMC: 4240
    AIME: 7986

baseline_think_tokens:
  GSM8K: 1144
  MATH500: 2800
  GPQA: 651
  AMC: 4240
  AIME: 7986
